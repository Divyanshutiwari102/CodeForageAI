spring:
  application:
    name: CodeForageAI
    description: AI-powered web application builder

  datasource:
    url: jdbc:postgresql://localhost:5433/codeforagedb
    username: postgres
    password: password123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-api-key-here}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-ada-002

jwt:
  secret-key: ${JWT_SECRET:CodeForageAISecretKey2024XYZabcdefghijklmnopqrstuvwxyz0123456789AB}

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: codeforageai

payment:
  provider: razorpay
  rate-limit:
    verify-max-requests: ${PAYMENT_VERIFY_RATE_LIMIT_MAX_REQUESTS:10}
    verify-window-seconds: ${PAYMENT_VERIFY_RATE_LIMIT_WINDOW_SECONDS:60}
    fail-open-on-redis-error: ${PAYMENT_VERIFY_RATE_LIMIT_FAIL_OPEN:true}
    circuit-breaker:
      failure-threshold: ${PAYMENT_VERIFY_RATE_LIMIT_CB_FAILURE_THRESHOLD:5}
      open-duration-seconds: ${PAYMENT_VERIFY_RATE_LIMIT_CB_OPEN_DURATION_SECONDS:30}

razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}


qdrant:
  host: localhost
  port: 6334
  collection-name: codeforageai-files

kubernetes:
  ingress-domain: preview.localhost
  preview-image: node:20-alpine
  minio-endpoint: http://localhost:9000
  minio-access-key: minioadmin
  minio-secret-key: minioadmin
  minio-bucket: codeforageai

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
