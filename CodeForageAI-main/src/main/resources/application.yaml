spring:
  application:
    name: CodeForageAI
    description: AI-powered web application builder

  datasource:
    url: ${DB_URL:}
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-ada-002

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

jwt:
  secret-key: ${JWT_SECRET:}
  access-token-ttl-ms: ${JWT_ACCESS_TOKEN_TTL_MS:3600000}
auth:
  cookie:
    secure: ${AUTH_COOKIE_SECURE:true}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}

minio:
  endpoint: ${MINIO_ENDPOINT:}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket: ${MINIO_BUCKET:codeforageai}

payment:
  provider: razorpay
  pricing:
    pro-amount-paise: ${PAYMENT_PRO_AMOUNT_PAISE:0}
  rate-limit:
    verify-max-requests: ${PAYMENT_VERIFY_RATE_LIMIT_MAX_REQUESTS:10}
    verify-window-seconds: ${PAYMENT_VERIFY_RATE_LIMIT_WINDOW_SECONDS:60}
    fail-open-on-redis-error: ${PAYMENT_VERIFY_RATE_LIMIT_FAIL_OPEN:true}
    circuit-breaker:
      failure-threshold: ${PAYMENT_VERIFY_RATE_LIMIT_CB_FAILURE_THRESHOLD:5}
      open-duration-seconds: ${PAYMENT_VERIFY_RATE_LIMIT_CB_OPEN_DURATION_SECONDS:30}
  monitoring:
    failure-rate-alert-threshold-percent: ${PAYMENT_MONITORING_FAILURE_RATE_ALERT_THRESHOLD_PERCENT:30}
    failure-rate-alert-min-events: ${PAYMENT_MONITORING_FAILURE_RATE_ALERT_MIN_EVENTS:20}

razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}


qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6334}
  collection-name: ${QDRANT_COLLECTION_NAME:codeforageai-files}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

upload:
  max-size-bytes: ${UPLOAD_MAX_SIZE_BYTES:1048576}
  rate-limit:
    max-requests: ${UPLOAD_RATE_LIMIT_MAX_REQUESTS:30}
    window-seconds: ${UPLOAD_RATE_LIMIT_WINDOW_SECONDS:60}

kubernetes:
  enabled: ${KUBERNETES_ENABLED:false}
  ingress-domain: ${KUBERNETES_INGRESS_DOMAIN:preview.localhost}
  preview-image: ${KUBERNETES_PREVIEW_IMAGE:node:20-alpine}
  minio-endpoint: ${KUBERNETES_MINIO_ENDPOINT:}
  minio-access-key: ${KUBERNETES_MINIO_ACCESS_KEY:}
  minio-secret-key: ${KUBERNETES_MINIO_SECRET_KEY:}
  minio-bucket: ${KUBERNETES_MINIO_BUCKET:codeforageai}

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  metrics:
    export:
      prometheus:
        enabled: true

observability:
  logs:
    loki:
      endpoint: ${LOKI_ENDPOINT:http://localhost:3100}
  alerts:
    email:
      enabled: ${OBS_ALERT_EMAIL_ENABLED:false}
      recipients: ${OBS_ALERT_EMAIL_RECIPIENTS:}
    slack:
      enabled: ${OBS_ALERT_SLACK_ENABLED:false}
      webhook-url: ${OBS_ALERT_SLACK_WEBHOOK_URL:}
      channel: ${OBS_ALERT_SLACK_CHANNEL:#alerts}
      username: ${OBS_ALERT_SLACK_USERNAME:CodeForageAI Alerts}
