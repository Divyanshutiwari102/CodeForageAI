version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: codeforage-postgres
    environment:
      POSTGRES_DB: codeforagedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123   # 🔥 CHANGE THIS
    ports:
      - "5433:5432"   # 🔥 VERY IMPORTANT
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: codeforage-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: codeforage-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  qdrant:
    image: qdrant/qdrant:latest
    container_name: codeforage-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  minio_data:
  qdrant_data: