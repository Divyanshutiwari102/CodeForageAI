version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: codeforage-postgres
    environment:
      POSTGRES_DB: codeforagedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123   # 🔥 CHANGE THIS
    ports:
      - "5433:5432"   # 🔥 VERY IMPORTANT
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: codeforage-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: codeforage-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  qdrant:
    image: qdrant/qdrant:latest
    container_name: codeforage-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  loki:
    image: grafana/loki:2.9.8
    container_name: codeforage-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.8
    container_name: codeforage-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.0
    container_name: codeforage-grafana
    ports:
      - "3001:3000"
    depends_on:
      - loki

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: codeforage-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: codeforage-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
